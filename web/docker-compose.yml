services:
  mariadb:
    image: mariadb:11.8
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: labor_insurance
      MARIADB_USER: labor_app
      MARIADB_PASSWORD: labor_app_password
      MARIADB_ROOT_PASSWORD: local_root_password
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mariadb_data:
